name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: npm install || echo "No dependencies"

      - name: Build app
        run: npm run build

      - name: Build Docker image
        run: docker build -t demo-app .
